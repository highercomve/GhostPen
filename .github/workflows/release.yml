name: Release

# Build GhostPen for every target and publish the bundles to a single GitHub Release.
#
# Coverage (all x86_64 + arm64):
#   - macOS         .app / .dmg      (aarch64 + x86_64, both built on the Apple-Silicon runner)
#   - Windows       .msi / NSIS .exe (x86_64 native + aarch64 cross-compile)
#   - Linux         .deb .rpm .AppImage  (x86_64 + aarch64, each on a native runner)
#
# Linux "targets": "all" in tauri.conf.json already produces deb + rpm + appimage in one build.
#
# Trigger: push a tag like `v0.1.0`, or run manually (workflow_dispatch) with a tag input.
#
# Why three jobs instead of running tauri-action inside the matrix:
#   tauri-action looks up the target release *by tag*, but the GitHub API does not return
#   DRAFT releases by tag. So a matrix of N jobs each fail the lookup and each create their
#   own draft, fragmenting assets across N invisible drafts. Instead:
#     1. create-release  → make ONE draft release, export its id.
#     2. build           → every matrix job uploads its bundles into that release by id.
#     3. publish-release → flip the draft to published once all uploads succeed.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under (e.g. v0.1.0). Created if it doesn't exist."
        required: true
        default: "v0.0.0-dev"

# One release run per tag; cancel superseded runs of the same ref.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  # ---------------------------------------------------------------------------
  # 1. Create a single draft release that every build job uploads into.
  # ---------------------------------------------------------------------------
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            // Reuse an existing (draft or published) release for this tag if one already
            // exists — keeps re-runs idempotent instead of stacking duplicates.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = releases.find((r) => r.tag_name === tag);
            if (existing) {
              core.info(`Reusing existing release ${existing.id} for ${tag}`);
              return existing.id;
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `GhostPen ${tag}`,
              body: "Automated build. See the assets below for your platform.",
              draft: true,
              prerelease: false,
            });
            core.info(`Created draft release ${data.id} for ${tag}`);
            return data.id;

  # ---------------------------------------------------------------------------
  # 2. Build every target and upload its bundles into the draft release.
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    # Best-effort lanes (a failure here never blocks publishing the rest of the release):
    #   - windows-arm64: whisper.cpp/ggml refuses its CPU backend under MSVC on ARM, so it
    #     ships the base app only (no captions).
    #   - vulkan lanes: GPU bundles are an extra on top of the always-green cpu/metal set; if a
    #     Vulkan build regresses, the cpu bundle for that platform still ships.
    continue-on-error: ${{ contains(matrix.label, 'windows-arm64') || matrix.kind == 'vulkan' }}
    strategy:
      fail-fast: false
      matrix:
        # Two captions bundles per platform where possible (ADR-008):
        #   - cpu/metal: always-green, the primary download. macOS uses metal (Apple GPU).
        #   - vulkan:    GPU acceleration on any vendor (NVIDIA/AMD/Intel), uploaded with a
        #                `-vulkan` suffix so it doesn't collide with the cpu bundle's filename.
        # Backends + their build setup mirror pr-build.yml. windows-arm64 is base-only.
        include:
          # ---- macOS → metal (Apple GPU, built on Apple Silicon; x86_64 via cross-compile) ----
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            kind: metal
            args: "--target aarch64-apple-darwin --features captions-metal"
          - label: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            kind: metal
            args: "--target x86_64-apple-darwin --features captions-metal"

          # ---- Linux → cpu + vulkan (native runners → deb + rpm + appimage) ----
          - label: linux-x86_64-cpu
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            kind: cpu
            args: "--features captions"
          - label: linux-x86_64-vulkan
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            kind: vulkan
            args: "--features captions-vulkan"
          - label: linux-arm64-cpu
            # GitHub-hosted arm64 Linux runner (free for public repos). For a private repo
            # without arm64 entitlement, swap this to a self-hosted arm64 runner.
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            kind: cpu
            args: "--features captions"
          - label: linux-arm64-vulkan
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            kind: vulkan
            args: "--features captions-vulkan"

          # ---- Windows → cpu only (x86_64); arm64 base-only (cross-compile) ----
          # NOTE: windows-x86_64-vulkan is intentionally NOT shipped yet. ggml's nested
          # vulkan-shaders-gen build fails on the GitHub Windows runners (compiler detection,
          # then MSVC C1041 + parallel link races) on both windows-latest (VS 2026 preview)
          # AND windows-2022. The lane is kept in pr-build.yml (continue-on-error) for
          # iterating on a fix; re-add it here once it builds green. Windows users get the
          # cpu captions bundle in the meantime.
          - label: windows-x86_64-cpu
            os: windows-latest
            target: x86_64-pc-windows-msvc
            kind: cpu
            args: "--target x86_64-pc-windows-msvc --features captions"
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            kind: base
            args: "--target aarch64-pc-windows-msvc"
            # No captions here (see continue-on-error note). Force the tauri.mjs wrapper's
            # auto-detect OFF so it doesn't enable the broken MSVC/ARM CPU backend.
            caps_env: "0"

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            libfuse2 \
            xdg-utils \
            build-essential curl wget file \
            cmake \
            libasound2-dev \
            clang libclang-dev

      # ggml's Vulkan backend needs glslc/shaderc + the Vulkan headers/loader at build time.
      - name: Install Vulkan SDK (Linux, vulkan backend)
        if: matrix.kind == 'vulkan' && startsWith(matrix.os, 'ubuntu')
        run: |
          set -e
          if [ "$(uname -m)" = "x86_64" ]; then
            # LunarG ships glslc + current headers + loader for x86_64 via apt.
            wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
              | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
            sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
              https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
            sudo apt-get update
            sudo apt-get install -y vulkan-sdk
          else
            # arm64: no LunarG apt repo. Build glslc (the one build-time tool ggml needs) from
            # shaderc source, and install recent Vulkan-Headers from source — Ubuntu 22.04's
            # libvulkan-dev headers are too old for current ggml-vulkan (LayerSettingsEXT,
            # CooperativeMatrixKHR, eMesaDozen, ...). The distro libvulkan loader is forward-
            # compatible, so it stays for link/runtime.
            sudo apt-get update
            sudo apt-get install -y libvulkan-dev glslang-tools spirv-tools \
              cmake ninja-build python3 git
            git clone --depth 1 https://github.com/google/shaderc.git "$RUNNER_TEMP/shaderc"
            (
              cd "$RUNNER_TEMP/shaderc"
              ./utils/git-sync-deps
              cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DSHADERC_SKIP_TESTS=ON \
                -DSHADERC_SKIP_EXAMPLES=ON \
                -DSHADERC_SKIP_COPYRIGHT_CHECK=ON
              cmake --build build --target glslc_exe
              sudo install -m755 build/glslc/glslc /usr/local/bin/glslc
            )
            git clone --depth 1 --branch vulkan-sdk-1.4.313.0 \
              https://github.com/KhronosGroup/Vulkan-Headers.git "$RUNNER_TEMP/vulkan-headers"
            cmake -S "$RUNNER_TEMP/vulkan-headers" -B "$RUNNER_TEMP/vulkan-headers/build"
            sudo cmake --install "$RUNNER_TEMP/vulkan-headers/build"
          fi
          glslc --version || echo "::warning::glslc not found — ggml Vulkan shader-gen will fail"

      # whisper.cpp is built via CMake; macOS runners ship clang + the Metal toolchain
      # (xcrun metal) the metal backend needs, but not always cmake.
      - name: Install macOS build dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake

      # whisper-rs's bindgen needs libclang; the cmake crate needs CMake. Provide both on Windows.
      - name: Install Windows build dependencies (LLVM for whisper-rs bindgen)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      # Vulkan SDK (glslc + headers + loader) for the Windows vulkan backend.
      - name: Install Vulkan SDK (Windows, vulkan backend)
        if: matrix.kind == 'vulkan' && startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          choco install vulkan-sdk --no-progress -y
          $sdk = (Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "VULKAN_SDK=$sdk" >> $env:GITHUB_ENV
          echo "$sdk\Bin" >> $env:GITHUB_PATH

      # ggml builds a host tool `vulkan-shaders-gen` (GLSL→SPIR-V) as a nested CMake
      # ExternalProject that, with the Visual Studio generator, fails to detect the compiler
      # ("No CMAKE_C_COMPILER could be found"). Put the MSVC host (x64) toolchain on PATH AND
      # force the Ninja generator so both the main and nested builds use cl.exe from PATH.
      - name: Set up MSVC dev environment (Windows, vulkan backend)
        if: matrix.kind == 'vulkan' && startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Force Ninja generator (Windows, vulkan backend)
        if: matrix.kind == 'vulkan' && startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          # /FS avoids MSVC C1041 (shared vc140.pdb) in the nested vulkan-shaders-gen build.
          echo "CL=/FS" >> $env:GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # kind in the key so cpu/vulkan builds of a target don't clobber each other.
          key: ${{ matrix.target }}-${{ matrix.kind }}

      - name: Install frontend dependencies
        run: npm ci

      # cpu / metal / base lanes: tauri-action builds AND uploads into the draft release by id.
      - name: Build and upload bundles
        if: matrix.kind != 'vulkan'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: "true"
          GHOSTPEN_CAPTIONS: ${{ matrix.caps_env }}
          GGML_NATIVE: "OFF"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
        with:
          # Upload into the one draft release created above — no per-job release creation.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      # vulkan lanes: build ONLY (no releaseId) — the cpu bundle owns the natural filenames, so
      # the GPU bundles are renamed with a `-vulkan` suffix and uploaded separately below.
      - name: Build bundles (vulkan, no upload)
        if: matrix.kind == 'vulkan'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: "true"
          GGML_NATIVE: "OFF"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
        with:
          args: ${{ matrix.args }}

      # Rename the Vulkan installers with a `-vulkan` marker and upload them into the draft
      # release by id (gh release upload can't resolve a draft by tag; octokit by id can).
      - name: Upload Vulkan bundles (renamed)
        if: matrix.kind == 'vulkan'
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          TARGET: ${{ matrix.target }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = Number(process.env.RELEASE_ID);
            const target = process.env.TARGET || '';
            // Native builds bundle to target/release/bundle; --target builds to
            // target/<triple>/release/bundle. Cover both.
            const roots = [
              path.join('src-tauri', 'target', target, 'release', 'bundle'),
              path.join('src-tauri', 'target', 'release', 'bundle'),
            ];
            const exts = /\.(deb|rpm|AppImage|msi|exe)$/i;
            const walk = (d) => {
              if (!fs.existsSync(d)) return [];
              return fs.readdirSync(d, { withFileTypes: true }).flatMap((e) => {
                const p = path.join(d, e.name);
                return e.isDirectory() ? walk(p) : [p];
              });
            };
            const files = [...new Set(roots.flatMap(walk))].filter((f) => exts.test(f));
            if (!files.length) { core.setFailed('no vulkan bundles found to upload'); return; }
            for (const f of files) {
              const base = path.basename(f);
              const dot = base.lastIndexOf('.');
              const name = `${base.slice(0, dot)}-vulkan${base.slice(dot)}`;
              core.info(`uploading ${name} (${(fs.statSync(f).size / 1e6).toFixed(1)} MB)`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name,
                data: fs.readFileSync(f),
              });
            }

  # ---------------------------------------------------------------------------
  # 3. Publish the release once every platform has uploaded successfully.
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Flip draft to published
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              prerelease: false,
            });
            core.info(`Published release ${process.env.RELEASE_ID}`);
