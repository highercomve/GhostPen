name: Release

# Build GhostPen for every target and publish the bundles to a GitHub Release.
#
# Coverage (all x86_64 + arm64):
#   - macOS         .app / .dmg      (aarch64 + x86_64, both built on the Apple-Silicon runner)
#   - Windows       .msi / NSIS .exe (x86_64 native + aarch64 cross-compile)
#   - Linux         .deb .rpm .AppImage  (x86_64 + aarch64, each on a native runner)
#
# Linux "targets": "all" in tauri.conf.json already produces deb + rpm + appimage in one build.
#
# Trigger: push a tag like `v0.1.0`, or run manually (workflow_dispatch) with a tag input.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under (e.g. v0.1.0). Created if it doesn't exist."
        required: true
        default: "v0.0.0-dev"

# One release run per tag; cancel superseded runs of the same ref.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- macOS (built on Apple Silicon; x86_64 via cross-compile) ----
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - label: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"

          # ---- Linux (native runners → deb + rpm + appimage) ----
          - label: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - label: linux-arm64
            # GitHub-hosted arm64 Linux runner (free for public repos). For a private repo
            # without arm64 entitlement, swap this to a self-hosted arm64 runner.
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: ""

          # ---- Windows (x86_64 native; aarch64 cross-compile) ----
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            args: "--target aarch64-pc-windows-msvc"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            libfuse2 \
            xdg-utils \
            build-essential curl wget file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # WebKitGTK DMABUF renderer crashes on some setups; harmless to set on CI.
          NO_STRIP: "true"
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "GhostPen ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Automated build. See the assets below for your platform."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
